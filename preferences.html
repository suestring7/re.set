<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="/shared.js"></script>
<title>re.set — Preferences</title>
<style>
:root { --bg:#F7F7F9; --card:#fff; --acc:#B794F4; --acc2:#7C3AED; --text:#111827; --muted:#9CA3AF; --line:#E5E7EB; --mono:"SF Mono","Fira Code",monospace; }
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:-apple-system,sans-serif;font-size:13px;color:var(--text);padding:16px}
.p-tabs{display:flex;gap:6px;margin-bottom:16px;border-bottom:1px solid var(--line);padding-bottom:10px}
.ptab{background:none;border:none;padding:7px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-radius:6px;font-family:inherit}
.ptab.active{background:var(--acc);color:#fff}
.panel{display:none}.panel.active{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:12px}
.lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1.5px solid var(--line);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;background:var(--card);transition:all .15s}
.chip.sel{background:var(--acc);color:#fff;border-color:var(--acc)}
.row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bg)}
.row:last-child{border-bottom:none}
.dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.w-label{flex:1;font-size:13px;font-weight:600}
.w-in{width:72px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-family:var(--mono);font-size:13px;text-align:right}
.save{width:100%;margin-top:14px;padding:11px;background:var(--acc2);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.save:hover{opacity:.9}
.msg{font-size:12px;color:#059669;margin-top:10px;min-height:18px}
</style>
</head>
<body>

<div class="p-tabs">
  <button class="ptab active" id="tab-gen" onclick="setTab('gen')">—</button>
  <button class="ptab" id="tab-score" onclick="setTab('score')">—</button>
</div>

<div class="panel active" id="panel-gen">
  <div class="card">
    <div class="lbl" id="lbl-interval">Break interval</div>
    <div class="chips" id="interval-chips"></div>
  </div>
  <div class="card">
    <div class="lbl" id="lbl-lang">Language</div>
    <div class="chips">
      <button type="button" class="chip" id="lang-zh" onclick="selLang='zh';renderLang()">中文</button>
      <button type="button" class="chip" id="lang-en" onclick="selLang='en';renderLang()">English</button>
    </div>
  </div>
</div>

<div class="panel" id="panel-score">
  <div class="card">
    <div class="lbl" id="lbl-weights">Focus score weight per activity type</div>
    <div id="weight-rows"></div>
    <p style="font-size:11px;color:var(--muted);margin-top:10px;line-height:1.45" id="weight-hint">
      Score from focus time uses floor(minutes × weight ÷ 5). Default weight is 1.0 (range 0.1–3.0).
    </p>
  </div>
</div>

<button class="save" id="btn-save" onclick="saveAll()">Save</button>
<div class="msg" id="msg"></div>

<script>
let lang = 'en';
let selLang = 'zh';
let curInterval = 30;
let presets = [15,20,25,30,45,60];
let types = [];

const ZH = {
  gen:'通用', score:'分值', interval:'休息间隔', lang:'语言', weights:'各类活动专注分值权重',
  hint:'专注时段得分按 floor(分钟 × 权重 ÷ 5) 计算。默认权重 1.0（范围 0.1–3.0）。',
  save:'保存', saved:'已保存',
};
const EN = {
  gen:'General', score:'Scoring', interval:'Break interval', lang:'Language',
  weights:'Focus score weight per activity type',
  hint:'Focus score uses floor(minutes × weight ÷ 5). Default 1.0 (range 0.1–3.0).',
  save:'Save', saved:'Saved',
};
function L(k){ return (lang==='zh'?ZH:EN)[k]||k; }

function setTab(id){
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id==='gen'?'tab-gen':'tab-score').classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(id==='gen'?'panel-gen':'panel-score').classList.add('active');
}

function renderLang(){
  document.getElementById('lang-zh').classList.toggle('sel', selLang==='zh');
  document.getElementById('lang-en').classList.toggle('sel', selLang==='en');
}

function renderIntervalChips(){
  const el = document.getElementById('interval-chips');
  el.innerHTML = presets.map(m=>`<button type="button" class="chip${m===curInterval?' sel':''}"
    onclick="curInterval=${m};renderIntervalChips()">${m} min</button>`).join('');
}

function renderWeights(){
  const el = document.getElementById('weight-rows');
  el.innerHTML = types.map((tp,i)=>`
    <div class="row">
      <span class="dot" style="background:${tp.color}"></span>
      <span class="w-label">${tp.label}</span>
      <input type="number" class="w-in" min="0.1" max="3" step="0.1"
        value="${(tp.weight!=null?tp.weight:1).toFixed(1)}"
        onchange="types[${i}].weight=parseFloat(this.value)||1">
    </div>`).join('');
}

function applyLangUI(){
  lang = selLang;
  document.getElementById('tab-gen').textContent = L('gen');
  document.getElementById('tab-score').textContent = L('score');
  document.getElementById('lbl-interval').textContent = L('interval');
  document.getElementById('lbl-lang').textContent = L('lang');
  document.getElementById('lbl-weights').textContent = L('weights');
  document.getElementById('weight-hint').textContent = L('hint');
  document.getElementById('btn-save').textContent = L('save');
}

async function init(){
  try{
    const r = await fetch('/api/prefs').then(x=>x.json());
    lang = r.lang || 'zh';
    selLang = r.lang || 'zh';
    curInterval = r.interval_minutes || 30;
    presets = r.interval_presets || presets;
    types = await RS.loadActivityTypes();
    applyLangUI();
    renderIntervalChips();
    renderLang();
    renderWeights();
  }catch(e){
    document.getElementById('msg').textContent = String(e);
  }
}

async function saveAll(){
  document.getElementById('msg').textContent = '';
  try{
    await fetch('/api/prefs',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        interval_minutes: curInterval,
        lang: selLang,
        activity_types: types,
      }),
    });
    lang = selLang;
    applyLangUI();
    document.getElementById('msg').textContent = L('saved');
    setTimeout(()=>{ document.getElementById('msg').textContent=''; }, 2000);
  }catch(e){
    document.getElementById('msg').textContent = String(e);
  }
}

init();
</script>
</body>
</html>
