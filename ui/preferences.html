<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="/shared.js"></script>
<title>re.set — Preferences</title>
<style>
:root {
  --bg:#F7F7F9; --card:#fff; --acc:#B794F4; --acc2:#7C3AED;
  --text:#111827; --muted:#9CA3AF; --line:#E5E7EB;
  --nav:#EFECF8; --nav-w:132px;
  --mono:"SF Mono","Fira Code",monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:-apple-system,sans-serif;font-size:13px;color:var(--text)}
body{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── Sidebar layout ── */
.prefs-layout{display:flex;flex:1;overflow:hidden}
.prefs-nav{
  width:var(--nav-w);background:var(--nav);border-right:1px solid var(--line);
  padding:12px 8px;display:flex;flex-direction:column;gap:2px;flex-shrink:0
}
.nav-section{
  font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.06em;padding:8px 10px 6px
}
.nav-tab{
  display:block;width:100%;text-align:left;padding:7px 10px;
  border-radius:6px;border:none;background:none;
  font-size:13px;font-weight:500;color:var(--text);cursor:pointer;
  font-family:inherit;transition:background .12s
}
.nav-tab:hover:not(.active){background:rgba(124,58,237,.08)}
.nav-tab.active{background:var(--acc);color:#fff;font-weight:600}

/* ── Content ── */
.prefs-content{flex:1;overflow-y:auto;padding:16px}
.panel{display:none}.panel.active{display:block}
.panel-title{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text)}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px}
.lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}

/* ── Chips ── */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1.5px solid var(--line);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;background:var(--card);transition:all .15s}
.chip.sel{background:var(--acc);color:#fff;border-color:var(--acc)}

/* ── Weight rows ── */
.w-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bg)}
.w-row:last-child{border-bottom:none}
.dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.w-label{flex:1;font-size:13px;font-weight:600}
.w-parent{font-size:11px;color:var(--muted);font-weight:400;margin-left:3px}
.w-in{
  width:66px;padding:5px 7px;border:1px solid var(--line);border-radius:6px;
  font-family:var(--mono);font-size:12px;text-align:right;background:var(--bg)
}
.w-in:focus{outline:none;border-color:var(--acc)}

/* ── Type manager ── */
.tm-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.tm-color{
  width:18px;height:18px;border-radius:50%;border:2px solid var(--line);cursor:pointer;
  padding:0;flex-shrink:0;-webkit-appearance:none;overflow:hidden
}
.tm-color::-webkit-color-swatch-wrapper{padding:0}
.tm-color::-webkit-color-swatch{border:none;border-radius:50%}
.tm-label{
  flex:1;padding:3px 7px;border:1px solid var(--line);border-radius:5px;
  font-size:12px;font-family:inherit;background:var(--bg);color:var(--text);outline:none
}
.tm-label:focus{border-color:var(--acc)}
.tm-parent{
  width:94px;padding:3px 5px;border:1px solid var(--line);border-radius:5px;
  font-size:11px;font-family:inherit;background:var(--bg);color:var(--text);
  outline:none;flex-shrink:0
}
.tm-parent:focus{border-color:var(--acc)}
.tm-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:0 2px;flex-shrink:0}
.tm-del:hover{color:#DC2626}
.tm-add-row{
  display:flex;align-items:center;gap:6px;margin-top:8px;
  padding-top:8px;border-top:1px solid var(--line)
}

/* ── Footer save ── */
.save-bar{
  padding:10px 16px;border-top:1px solid var(--line);background:var(--bg);
  display:flex;align-items:center;gap:12px;flex-shrink:0
}
.save{
  padding:8px 22px;background:var(--acc2);color:#fff;border:none;border-radius:8px;
  font-size:13px;font-weight:600;cursor:pointer;font-family:inherit
}
.save:hover{opacity:.9}
.msg{font-size:12px;color:#059669;min-height:16px}
</style>
</head>
<body>

<div class="prefs-layout">
  <nav class="prefs-nav">
    <div class="nav-section" id="nav-hdr">Settings</div>
    <button class="nav-tab active" id="tab-gen"   onclick="setTab('gen')">General</button>
    <button class="nav-tab"        id="tab-score" onclick="setTab('score')">Scoring</button>
    <button class="nav-tab"        id="tab-types" onclick="setTab('types')">Activities</button>
  </nav>

  <main class="prefs-content">

    <!-- ── General ── -->
    <div class="panel active" id="panel-gen">
      <div class="panel-title" id="title-gen">General</div>
      <div class="card">
        <div class="lbl" id="lbl-interval">Break interval</div>
        <div class="chips" id="interval-chips"></div>
      </div>
      <div class="card">
        <div class="lbl" id="lbl-lang">Language</div>
        <div class="chips">
          <button type="button" class="chip" id="lang-zh" onclick="selLang='zh';renderLang()">中文</button>
          <button type="button" class="chip" id="lang-en" onclick="selLang='en';renderLang()">English</button>
        </div>
      </div>
    </div>

    <!-- ── Scoring ── -->
    <div class="panel" id="panel-score">
      <div class="panel-title" id="title-score">Scoring</div>
      <div class="card">
        <div class="lbl" id="lbl-weights">Focus score weight</div>
        <div id="weight-rows"></div>
        <p style="font-size:11px;color:var(--muted);margin-top:10px;line-height:1.5" id="weight-hint"></p>
      </div>
    </div>

    <!-- ── Activity Types ── -->
    <div class="panel" id="panel-types">
      <div class="panel-title" id="title-types">Activities</div>
      <div class="card">
        <div class="lbl" id="lbl-types-mgr">Manage types</div>
        <div id="pref-type-manager"></div>
      </div>
    </div>

  </main>
</div>

<div class="save-bar">
  <button class="save" id="btn-save" onclick="saveAll()">Save</button>
  <div class="msg" id="msg"></div>
</div>

<script>
let lang = 'en', selLang = 'zh', curInterval = 30;
let presets = [15,20,25,30,45,60];
let types = [];
let _curTab = 'gen';

const ZH = {
  navHdr:'偏好设置', gen:'通用', score:'分值', types:'活动类型',
  interval:'休息间隔', lang:'语言',
  weights:'各类活动专注分值权重',
  hint:'得分 = floor(分钟 × 权重 ÷ 5)，范围 −5 到 5，负值扣分。',
  save:'保存', saved:'已保存', typesMgr:'管理活动类型',
  noParent:'无父类', newType:'新类型名称…',
};
const EN = {
  navHdr:'Preferences', gen:'General', score:'Scoring', types:'Activities',
  interval:'Break interval', lang:'Language',
  weights:'Focus score weight per activity type',
  hint:'Score = floor(minutes × weight ÷ 5). Range −5 to 5; negative deducts points.',
  save:'Save', saved:'Saved', typesMgr:'Manage types',
  noParent:'None', newType:'New type…',
};
function L(k){ return (lang==='zh'?ZH:EN)[k]||k; }

const FIXED = new Set(['work','entertainment','life']);

function setTab(id) {
  _curTab = id;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  if (id === 'score') renderWeights();
  if (id === 'types') renderPrefTypeManager();
}

function renderLang(){
  document.getElementById('lang-zh').classList.toggle('sel', selLang==='zh');
  document.getElementById('lang-en').classList.toggle('sel', selLang==='en');
}

function renderIntervalChips(){
  document.getElementById('interval-chips').innerHTML = presets.map(m=>
    `<button type="button" class="chip${m===curInterval?' sel':''}"
      onclick="curInterval=${m};renderIntervalChips()">${m} min</button>`
  ).join('');
}

function renderWeights(){
  document.getElementById('weight-rows').innerHTML = types.map((tp,i)=>{
    const par = types.find(p=>p.id===tp.parent_id);
    const parLabel = par ? `<span class="w-parent">(${par.label})</span>` : '';
    return `<div class="w-row">
      <span class="dot" style="background:${tp.color}"></span>
      <span class="w-label">${tp.label}${parLabel}</span>
      <input type="number" class="w-in" min="-5" max="5" step="0.1"
        value="${(tp.weight!=null?tp.weight:1).toFixed(1)}"
        onchange="types[${i}].weight=parseFloat(this.value)||0">
    </div>`;
  }).join('');
  document.getElementById('weight-hint').textContent = L('hint');
}

function renderPrefTypeManager() {
  const el = document.getElementById('pref-type-manager');
  const topLevel = types.filter(t=>!t.parent_id);

  function parentOpts(curParentId, excludeId) {
    const none = `<option value="">— ${L('noParent')} —</option>`;
    const opts = topLevel
      .filter(t=>t.id!==excludeId)
      .map(t=>`<option value="${t.id}"${t.id===curParentId?' selected':''}>${t.label}</option>`)
      .join('');
    return none + opts;
  }

  function paint() {
    const rows = types.map((tp,i)=>{
      const locked = FIXED.has(tp.id);
      return `<div class="tm-row" data-i="${i}">
        <input class="tm-color" type="color" value="${tp.color}" data-act="color" data-i="${i}">
        <input class="tm-label" type="text" value="${tp.label.replace(/"/g,'&quot;')}"
          data-act="label" data-i="${i}"${locked?' style="color:var(--muted)"':''}>
        <select class="tm-parent" data-act="parent" data-i="${i}">
          ${parentOpts(tp.parent_id||'', tp.id)}
        </select>
        <button type="button" class="tm-del" data-act="del" data-i="${i}"
          ${locked?' style="opacity:.3;pointer-events:none"':''}>×</button>
      </div>`;
    }).join('');

    const newParentOpts = `<option value="">— ${L('noParent')} —</option>`
      + topLevel.map(t=>`<option value="${t.id}">${t.label}</option>`).join('');

    const addRow = `<div class="tm-add-row">
      <input class="tm-color" type="color" id="tm-new-color" value="#7C5CFC">
      <input class="tm-label" type="text" id="tm-new-label" placeholder="${L('newType')}">
      <select class="tm-parent" id="tm-new-parent">${newParentOpts}</select>
      <button type="button" class="tm-del" data-act="add"
        style="color:var(--acc2);font-size:18px;font-weight:700;opacity:1">+</button>
    </div>`;

    el.innerHTML = rows + addRow;

    el.oninput = function(e) {
      const t = e.target, act = t.dataset&&t.dataset.act, i = +(t.dataset&&t.dataset.i);
      if (act==='color')  { types[i].color=t.value; }
      else if (act==='label')  { types[i].label=t.value; }
      else if (act==='parent') {
        types[i].parent_id = t.value||null;
        paint(); renderWeights();
      }
    };

    el.onclick = function(e) {
      const btn = e.target.closest('[data-act]');
      if (!btn||!el.contains(btn)) return;
      const act = btn.dataset.act;
      if (act==='del') {
        const i = +btn.dataset.i;
        if (FIXED.has(types[i]&&types[i].id)) return;
        const id = types[i].id;
        types.forEach(t=>{ if(t.parent_id===id) t.parent_id=null; });
        types.splice(i,1);
        paint(); renderWeights();
      } else if (act==='add') {
        const labelEl = el.querySelector('#tm-new-label');
        const colorEl = el.querySelector('#tm-new-color');
        const parentEl= el.querySelector('#tm-new-parent');
        if (!labelEl) return;
        const label = labelEl.value.trim();
        if (!label) { labelEl.focus(); return; }
        const id = label.toLowerCase().replace(/[^a-z0-9一-鿿]+/g,'_').replace(/^_+|_+$/g,'')||'c'+Date.now();
        types.push({
          id, label,
          color: colorEl?colorEl.value:'#7C5CFC',
          weight: 1,
          parent_id: parentEl&&parentEl.value||null,
        });
        labelEl.value='';
        paint(); renderWeights();
      }
    };
  }

  paint();
}

function applyLangUI(){
  lang = selLang;
  document.getElementById('nav-hdr').textContent    = L('navHdr');
  document.getElementById('tab-gen').textContent    = L('gen');
  document.getElementById('tab-score').textContent  = L('score');
  document.getElementById('tab-types').textContent  = L('types');
  document.getElementById('title-gen').textContent  = L('gen');
  document.getElementById('title-score').textContent= L('score');
  document.getElementById('title-types').textContent= L('types');
  document.getElementById('lbl-interval').textContent = L('interval');
  document.getElementById('lbl-lang').textContent   = L('lang');
  document.getElementById('lbl-weights').textContent= L('weights');
  document.getElementById('lbl-types-mgr').textContent = L('typesMgr');
  document.getElementById('btn-save').textContent   = L('save');
  const hint = document.getElementById('weight-hint');
  if (hint) hint.textContent = L('hint');
}

async function init(){
  try{
    const r = await fetch('/api/prefs').then(x=>x.json());
    lang = r.lang||'zh'; selLang = r.lang||'zh';
    curInterval = r.interval_minutes||30;
    presets = r.interval_presets||presets;
    types = await RS.loadActivityTypes();
    applyLangUI();
    renderIntervalChips();
    renderLang();
    renderWeights();
  }catch(e){
    document.getElementById('msg').textContent = String(e);
  }
}

async function saveAll(){
  // Flush any weight inputs that may not have fired onchange yet
  document.querySelectorAll('.w-in').forEach((inp,i)=>{
    if(i<types.length) types[i].weight = parseFloat(inp.value)||0;
  });
  document.getElementById('msg').textContent = '';
  try{
    await fetch('/api/prefs',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({interval_minutes:curInterval, lang:selLang, activity_types:types}),
    });
    lang = selLang;
    applyLangUI();
    if (_curTab==='types') renderPrefTypeManager();
    document.getElementById('msg').textContent = L('saved');
    setTimeout(()=>{ document.getElementById('msg').textContent=''; },2000);
  }catch(e){
    document.getElementById('msg').textContent = String(e);
  }
}

init();
</script>
</body>
</html>
