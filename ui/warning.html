<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>(function(){var s=document.createElement('style');s.textContent=':root{--bg:#F4EFFA;--card:#fff;--line:#E8E0F0;--text:#2A1B3D;--sub:#4A3A5C;--muted:#8B7A9E;--acc:#A87FEC;--acc2:#6B4FA0;--acc-soft:#F0E6FB;--green:#059669;--amber:#D97706;--red:#DC2626}[data-theme="sage"]{--bg:#F2F5F2;--card:#fff;--line:#DDE6DD;--text:#1F2D24;--sub:#3A4A40;--muted:#7B8A80;--acc:#7BA888;--acc2:#4F7359;--acc-soft:#E5EFE6}[data-theme="mist"]{--bg:#EFF3F8;--card:#fff;--line:#DCE4EC;--text:#1B2A3D;--sub:#3A4A60;--muted:#7B8AA0;--acc:#7B9CC4;--acc2:#4D6E96;--acc-soft:#E5ECF5}[data-theme="ochre"]{--bg:#F8F2EC;--card:#fff;--line:#E8DDD0;--text:#2D1F14;--sub:#4A3A2A;--muted:#9A8472;--acc:#C8856B;--acc2:#8C5A40;--acc-soft:#F2E2D6}[data-theme="ink"],[data-appearance="dark"]{--bg:#1A1A1F;--card:#25252D;--line:#34343F;--text:#F0EBF7;--sub:#C5BDD0;--muted:#8C849A;--acc:#B794F4;--acc2:#C8B4F0;--acc-soft:rgba(183,148,244,.12)}@media(prefers-color-scheme:dark){:root:not([data-appearance="light"]):not([data-theme]){--bg:#1A1A1F;--card:#25252D;--line:#34343F;--text:#F0EBF7;--sub:#C5BDD0;--muted:#8C849A;--acc:#B794F4;--acc2:#C8B4F0;--acc-soft:rgba(183,148,244,.12)}}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}button{font-family:inherit}input{font-family:inherit;color:inherit;outline:none}';document.head.insertBefore(s,document.head.firstChild);var t=localStorage.getItem('reset_theme');if(t)document.documentElement.setAttribute('data-theme',t);var a=localStorage.getItem('reset_appearance');if(a==='dark')document.documentElement.setAttribute('data-appearance','dark');else if(a==='light')document.documentElement.setAttribute('data-appearance','light');var c=localStorage.getItem('reset_custom_colors');if(c)try{var o=JSON.parse(c),r=document.documentElement;Object.keys(o).forEach(function(k){r.style.setProperty('--'+k,o[k]);});}catch(e){}})()</script>
<link rel="stylesheet" href="/theme.css">
<style>
html, body { width:380px; height:114px; overflow:hidden; border-radius:14px; margin:0; }
.card {
  width:380px; height:114px;
  background:var(--card); border:1.5px solid var(--acc);
  border-radius:14px; overflow:hidden;
  box-shadow:0 18px 50px rgba(168,127,236,.25);
  display:flex; flex-direction:column;
}
.header { padding:16px 18px 12px; display:flex; align-items:center; gap:12px; flex:1; }
.icon-box {
  width:38px; height:38px; border-radius:10px;
  background:var(--acc-soft); display:flex; align-items:center;
  justify-content:center; font-size:20px; flex-shrink:0;
}
.info { flex:1; min-width:0; }
.info-title { font-size:13px; font-weight:600; color:var(--text); }
.info-sub   { font-size:11px; color:var(--muted); margin-top:2px; }
.countdown  {
  font-family:var(--mono); font-size:22px; font-weight:300;
  color:var(--acc2); font-variant-numeric:tabular-nums;
}
.strip-bg   { height:3px; background:var(--line); flex-shrink:0; }
.strip-fill { height:100%; background:var(--acc); transition:width 1s linear; }
.footer     { display:flex; border-top:1px solid var(--line); flex-shrink:0; }
.footer button {
  flex:1; height:38px; padding:0;
  background:none; border:none;
  font-size:12px; color:var(--muted);
  cursor:pointer; font-family:inherit;
  transition:background .1s;
}
.footer button:hover  { background:var(--acc-soft); }
.footer .sep          { width:1px; background:var(--line); flex-shrink:0; }
.footer .start-btn    { font-weight:600; color:var(--acc2); }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="icon-box">☕</div>
    <div class="info">
      <div class="info-title">该休息了</div>
      <div class="info-sub" id="sub">倒计时结束后自动开始</div>
    </div>
    <div class="countdown" id="cnt">01:00</div>
  </div>
  <div class="strip-bg"><div class="strip-fill" id="strip"></div></div>
  <div class="footer">
    <button id="postpone-btn" onclick="postpone()">再等 5 分钟</button>
    <div class="sep"></div>
    <button class="start-btn" onclick="startNow()">立即开始 →</button>
  </div>
</div>
<script>
var total = 60, n = 60, postponed = 0;
var MAX = 3;
var el    = document.getElementById('cnt');
var strip = document.getElementById('strip');
var btn   = document.getElementById('postpone-btn');

function fmt(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}
function updateUI() {
  el.textContent = fmt(n);
  strip.style.width = (total > 0 ? n / total * 100 : 0) + '%';
}

fetch('/api/prefs').then(function(r){return r.json();}).then(function(d){
  total = d.warning_advance_seconds || 60;
  n = total;
  updateUI();
}).catch(function(){});

setInterval(function() { if (n > 0) { n--; updateUI(); } }, 1000);
updateUI();

async function postpone() {
  btn.disabled = true;
  try {
    var r = await fetch('/api/postpone-warning', { method:'POST' });
    var d = await r.json();
    if (d.success) {
      postponed = d.postpones_used;
      n = total;
      updateUI();
      if (postponed >= MAX) {
        btn.textContent = '已达上限';
        btn.style.color = 'var(--red)';
      } else {
        btn.disabled = false;
        btn.textContent = '再等 5 分钟 (' + (MAX - postponed) + ')';
      }
    } else {
      btn.textContent = '已达上限';
      btn.style.color = 'var(--red)';
    }
  } catch(e) { btn.disabled = false; }
}

function startNow() {
  fetch('/api/trigger', { method:'POST' }).catch(function(){});
}
</script>
</body>
</html>
