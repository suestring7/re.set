<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<script>(function(){var s=document.createElement('style');s.textContent=':root{--bg:#F4EFFA;--card:#fff;--line:#E8E0F0;--text:#2A1B3D;--sub:#4A3A5C;--muted:#8B7A9E;--acc:#A87FEC;--acc2:#6B4FA0;--acc-soft:#F0E6FB;--green:#059669;--amber:#D97706;--red:#DC2626}[data-theme="sage"]{--bg:#F2F5F2;--card:#fff;--line:#DDE6DD;--text:#1F2D24;--sub:#3A4A40;--muted:#7B8A80;--acc:#7BA888;--acc2:#4F7359;--acc-soft:#E5EFE6}[data-theme="mist"]{--bg:#EFF3F8;--card:#fff;--line:#DCE4EC;--text:#1B2A3D;--sub:#3A4A60;--muted:#7B8AA0;--acc:#7B9CC4;--acc2:#4D6E96;--acc-soft:#E5ECF5}[data-theme="ochre"]{--bg:#F8F2EC;--card:#fff;--line:#E8DDD0;--text:#2D1F14;--sub:#4A3A2A;--muted:#9A8472;--acc:#C8856B;--acc2:#8C5A40;--acc-soft:#F2E2D6}[data-theme="ink"],[data-appearance="dark"]{--bg:#1A1A1F;--card:#25252D;--line:#34343F;--text:#F0EBF7;--sub:#C5BDD0;--muted:#8C849A;--acc:#B794F4;--acc2:#C8B4F0;--acc-soft:rgba(183,148,244,.12)}@media(prefers-color-scheme:dark){:root:not([data-appearance="light"]):not([data-theme]){--bg:#1A1A1F;--card:#25252D;--line:#34343F;--text:#F0EBF7;--sub:#C5BDD0;--muted:#8C849A;--acc:#B794F4;--acc2:#C8B4F0;--acc-soft:rgba(183,148,244,.12)}}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}button{font-family:inherit}';document.head.insertBefore(s,document.head.firstChild);var t=localStorage.getItem('reset_theme');if(t)document.documentElement.setAttribute('data-theme',t);var a=localStorage.getItem('reset_appearance');if(a==='dark')document.documentElement.setAttribute('data-appearance','dark');else if(a==='light')document.documentElement.setAttribute('data-appearance','light');})()</script>
<link rel="stylesheet" href="/theme.css">
<title>re.set — Alert</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.wrap{display:flex;flex-direction:column;align-items:center;gap:24px;max-width:380px;width:100%;padding:32px}
.icon{font-size:52px;line-height:1}
.msg{font-size:18px;font-weight:700;color:var(--text);text-align:center;line-height:1.5}
.sub{font-size:13px;color:var(--muted);text-align:center;font-family:var(--mono,monospace)}
.btn{padding:12px 36px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;background:var(--acc2);color:#fff;font-family:inherit;transition:opacity .15s}
.btn:hover{opacity:.85}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">⏰</div>
  <div class="msg" id="msg">提醒</div>
  <div class="sub" id="sub"></div>
  <button class="btn" onclick="dismiss()">知道了</button>
</div>
<script>
const params = new URLSearchParams(location.search);
const msg = params.get('msg') || '';
if (msg) document.getElementById('msg').textContent = msg;

const now = new Date();
document.getElementById('sub').textContent =
  String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

async function dismiss() {
  try { await fetch('/api/close', {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'}); } catch {}
}
</script>
</body>
</html>
