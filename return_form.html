<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="/shared.js"></script>
<title>re.set — Return Log</title>
<style>
  :root { --accent:#B794F4; --bg:#F7F7F9; --card:#fff; --text:#1a1a1a; --muted:#888; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); font-family:'Inter',system-ui,sans-serif;
         display:flex; flex-direction:column; align-items:center;
         justify-content:center; min-height:100vh; padding:16px; }
  .card { background:var(--card); border:1px solid #e8e8ec; border-radius:16px;
          padding:28px 28px 24px; width:100%; max-width:380px; }
  h2 { font-size:16px; font-weight:700; letter-spacing:.02em; margin-bottom:4px; }
  .away-time { font-size:40px; font-weight:300; font-family:monospace;
               color:var(--accent); letter-spacing:.06em; margin:12px 0 20px; }
  .section-label { font-size:11px; font-weight:600; text-transform:uppercase;
                   letter-spacing:.08em; color:var(--muted); margin-bottom:8px; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:18px; }
  .chip { border:1px solid #e0e0e6; border-radius:20px; padding:4px 14px;
          font-size:12px; cursor:pointer; transition:all .15s; background:var(--card); }
  .chip.sel { color:#fff; border-color:transparent; }
  .chip.restroom { background:#F3F0FF; border-color:var(--accent); color:#7C3AED; }
  .chip.restroom.sel { background:var(--accent); color:#fff; }
  input[type=text], input[type=number] {
    width:100%; border:1px solid #ddd; border-radius:8px; padding:9px 12px;
    font-size:14px; background:var(--card); outline:none; margin-bottom:18px;
    transition:border-color .2s; }
  input:focus { border-color:var(--accent); }
  .row { display:flex; gap:10px; }
  .row input { margin-bottom:0; }
  .row .unit { display:flex; align-items:center; padding:0 10px; color:var(--muted);
               font-size:13px; background:#f5f5f7; border:1px solid #ddd;
               border-radius:8px; white-space:nowrap; }
  .actions { display:flex; gap:10px; margin-top:6px; }
  .btn { flex:1; padding:11px; border:none; border-radius:10px; font-size:14px;
         font-weight:600; cursor:pointer; transition:opacity .15s; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { opacity:.85; }
  .btn-cancel  { background:#f0f0f3; color:var(--text); }
  .btn-cancel:hover  { opacity:.75; }
  .success { color:#22c55e; font-size:14px; text-align:center; margin-top:12px; }
</style>
</head>
<body>
<div class="card">
  <h2 id="hdr">欢迎回来</h2>
  <div class="away-time" id="awayTime">—</div>

  <div class="section-label" id="lblWhat">你去做什么了？</div>
  <div class="chips" id="chips"></div>

  <div class="section-label" id="lblDesc">备注（选填）</div>
  <input type="text" id="desc" placeholder="可不填">

  <div class="actions">
    <button class="btn btn-cancel" onclick="cancel()" id="btnCancel">取消</button>
    <button class="btn btn-primary" onclick="submit()" id="btnSubmit">记录并继续</button>
  </div>
  <div class="success" id="msg"></div>
</div>

<script>
const ZH = {
  hdr:'欢迎回来', lblWhat:'你去做什么了？', lblDesc:'备注（选填）',
  btnCancel:'取消', btnSubmit:'记录并继续',
  min:'分钟', away:'离开了',
  restroom:'洗手间', descPlaceholder:'可不填', msgOK:'已记录！',
};
const EN = {
  hdr:'Welcome Back', lblWhat:'What were you doing?', lblDesc:'Notes (optional)',
  btnCancel:'Cancel', btnSubmit:'Log & Continue',
  min:'min', away:'away for',
  restroom:'Restroom', descPlaceholder:'Optional', msgOK:'Logged!',
};

let lang = 'zh';
let ACT_TYPES = [];
let selType = 'restroom';
let awayMins = 0;

const BUILTIN_RESTROOM = {id:'restroom', label:'洗手间', label_en:'Restroom', color:'#B794F4'};

function t(k) { return (lang==='zh' ? ZH : EN)[k] || k; }

async function init() {
  try {
    const st = await fetch('/api/status').then(r=>r.json());
    lang = st.lang || 'zh';
    awayMins = st.away_seconds ? Math.round(st.away_seconds / 60) : 0;
    ACT_TYPES = await RS.loadActivityTypes();
  } catch (e) {
    console.error(e);
    ACT_TYPES = await RS.loadActivityTypes();
  }
  applyLang();
  renderChips();
  updateClock();
}

function updateClock() {
  if (awayMins <= 0) {
    document.getElementById('awayTime').textContent = t('away') + ' …';
    return;
  }
  const h = Math.floor(awayMins / 60);
  const m = awayMins % 60;
  document.getElementById('awayTime').textContent =
    h > 0 ? `${h}h ${m}m` : `${m} ${t('min')}`;
}

function applyLang() {
  document.documentElement.lang = lang;
  document.getElementById('hdr').textContent      = t('hdr');
  document.getElementById('lblWhat').textContent  = t('lblWhat');
  document.getElementById('lblDesc').textContent  = t('lblDesc');
  document.getElementById('desc').placeholder     = t('descPlaceholder');
  document.getElementById('btnCancel').textContent = t('btnCancel');
  document.getElementById('btnSubmit').textContent = t('btnSubmit');
}

function renderChips() {
  const c = document.getElementById('chips');
  c.innerHTML = '';
  // Built-in restroom chip first
  const label = lang === 'zh' ? BUILTIN_RESTROOM.label : BUILTIN_RESTROOM.label_en;
  const rChip = document.createElement('span');
  rChip.className = 'chip restroom' + (selType === 'restroom' ? ' sel' : '');
  rChip.textContent = label;
  rChip.onclick = () => { selType = 'restroom'; renderChips(); };
  c.appendChild(rChip);
  // Regular activity types
  ACT_TYPES.forEach(tp => {
    const sp = document.createElement('span');
    sp.className = 'chip' + (selType === tp.id ? ' sel' : '');
    if (selType === tp.id) sp.style.background = tp.color;
    else sp.style.borderColor = tp.color + '66';
    sp.textContent = lang === 'zh' ? (tp.label_zh || tp.label) : (tp.label_en || tp.label);
    sp.onclick = () => { selType = tp.id; renderChips(); };
    c.appendChild(sp);
  });
}

async function submit() {
  const wc = document.getElementById('desc').value.trim();
  try {
    const r = await fetch('/api/return-log', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({activity_type: selType, work_content: wc}),
    });
    const d = await r.json();
    document.getElementById('msg').textContent = t('msgOK');
    setTimeout(async () => {
      try { await fetch('/api/close-popup', {method:'POST'}); } catch {}
    }, 700);
  } catch(e) {
    document.getElementById('msg').textContent = 'Error: ' + e;
  }
}

function cancel() {
  fetch('/api/close-popup', { method: 'POST' }).catch(() => {});
}

init();
</script>
</body>
</html>
